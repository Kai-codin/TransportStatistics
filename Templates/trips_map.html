{% extends "base.html" %}
{% load static %}

{% block title %}Trips on {{ service_date }}{% endblock %}

{% block extra_head %}
<link href="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.css" rel="stylesheet" />
<link rel="stylesheet" href="{% static 'css/light/sidebar.css' %}" data-ts-theme />
<link rel="stylesheet" href="{% static 'css/shared/map.css' %}" data-ts-theme />
{% endblock %}

{% block body_class %}ts-app-page{% endblock %}

{% block content %}
<div class="ts-app">
  {% include "includes/sidebar.html" %}

  <main class="ts-main">
    <div class="ts-detail-layout">
      <div class="ts-detail-map-area">
        <div id="ts-detail-map"></div>
      </div>
    </div>
  </main>
</div>

<script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>

<script>
(function () {
  'use strict';

  const tripsData = {{ trips_json|safe }};

  const STYLE_BASE = 'https://maps.fluffynet.dev/styles/';
  const styleFor = t => STYLE_BASE + (t === 'dark' ? 'dark' : 'light') + '/style.json';

  let _theme;
  try {
    _theme = localStorage.getItem('ts_theme') || 'light';
  } catch {
    _theme = 'light';
  }

  // ─────────────────────────────────────────────
  // Colour helpers
  // ─────────────────────────────────────────────
  function hashString(str) {
    let h = 0;
    for (let i = 0; i < str.length; i++) {
      h = ((h << 5) - h) + str.charCodeAt(i);
      h |= 0;
    }
    return Math.abs(h);
  }

  function hslToHex(h, s, l) {
    s /= 100; l /= 100;
    const a = s * Math.min(l, 1 - l);

    const f = n => {
      const k = (n + h / 30) % 12;
      const color = l - a * Math.max(-1, Math.min(k - 3, Math.min(9 - k, 1)));
      return Math.round(255 * color).toString(16).padStart(2, '0');
    };

    return `#${f(0)}${f(8)}${f(4)}`;
  }

  function routeColor(trip, idx) {
    const seed = String(trip.id || trip.headcode || idx);
    let hue = hashString(seed) % 360;
    hue = (hue + idx * 97) % 360;
    return hslToHex(hue, 62, 48);
  }

  // ─────────────────────────────────────────────
  // Map init
  // ─────────────────────────────────────────────
  const map = new maplibregl.Map({
    container: 'ts-detail-map',
    style: styleFor(_theme),
    center: [-1.5, 52.5],
    zoom: 6,
  });

  map.addControl(new maplibregl.NavigationControl(), 'top-right');
  map.addControl(new maplibregl.ScaleControl(), 'bottom-left');

  // ─────────────────────────────────────────────
  // Load data efficiently
  // ─────────────────────────────────────────────
  map.on('load', () => {

    const features = [];

    let minLon = Infinity;
    let minLat = Infinity;
    let maxLon = -Infinity;
    let maxLat = -Infinity;

    for (let i = 0; i < tripsData.length; i++) {
      const trip = tripsData[i];
      const coords = trip.route_geometry;

      if (!coords || coords.length < 2) continue;

      const colour = routeColor(trip, i);

      // Route line
      features.push({
        type: 'Feature',
        geometry: {
          type: 'LineString',
          coordinates: coords
        },
        properties: {
          type: 'route',
          colour: colour
        }
      });

      // Origin
      features.push({
        type: 'Feature',
        geometry: {
          type: 'Point',
          coordinates: coords[0]
        },
        properties: {
          type: 'origin',
          colour: colour
        }
      });

      // Destination
      features.push({
        type: 'Feature',
        geometry: {
          type: 'Point',
          coordinates: coords[coords.length - 1]
        },
        properties: {
          type: 'dest',
          colour: colour
        }
      });

      // Bounds (FAST)
      for (let j = 0; j < coords.length; j++) {
        const lon = coords[j][0];
        const lat = coords[j][1];

        if (lon < minLon) minLon = lon;
        if (lat < minLat) minLat = lat;
        if (lon > maxLon) maxLon = lon;
        if (lat > maxLat) maxLat = lat;
      }
    }

    // ── single source ─────────────────────
    map.addSource('trips', {
      type: 'geojson',
      data: {
        type: 'FeatureCollection',
        features: features
      }
    });

    // ── routes ───────────────────────────
    map.addLayer({
      id: 'routes',
      type: 'line',
      source: 'trips',
      filter: ['==', ['get', 'type'], 'route'],
      layout: {
        'line-cap': 'round',
        'line-join': 'round'
      },
      paint: {
        'line-color': ['get', 'colour'],
        'line-width': 4,
        'line-opacity': [
          'interpolate', ['linear'], ['zoom'],
          5, 0.3,
          10, 0.9
        ]
      }
    });

    // ── origins ──────────────────────────
    map.addLayer({
      id: 'origins',
      type: 'circle',
      source: 'trips',
      filter: ['==', ['get', 'type'], 'origin'],
      paint: {
        'circle-radius': 6,
        'circle-color': ['get', 'colour'],
        'circle-stroke-width': 2,
        'circle-stroke-color': '#ffffff'
      }
    });

    // ── destinations ─────────────────────
    map.addLayer({
      id: 'destinations',
      type: 'circle',
      source: 'trips',
      filter: ['==', ['get', 'type'], 'dest'],
      paint: {
        'circle-radius': 6,
        'circle-color': '#ffffff',
        'circle-stroke-width': 2,
        'circle-stroke-color': ['get', 'colour']
      }
    });

    // ── fit bounds ───────────────────────
    if (minLon !== Infinity) {
      map.fitBounds(
        [
          [minLon - 0.05, minLat - 0.05],
          [maxLon + 0.05, maxLat + 0.05]
        ],
        { padding: 48, duration: 500 }
      );
    }
  });

  // ─────────────────────────────────────────────
  // Theme switching (safe)
  // ─────────────────────────────────────────────
  document.addEventListener('ts:themechange', e => {
    const theme = e.detail?.theme || _theme;
    _theme = theme;

    map.setStyle(styleFor(theme));

    map.once('styledata', () => {
      // reload data after style reset
      map.fire('load');
    });
  });

})();
</script>

{% endblock %}
